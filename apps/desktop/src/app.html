<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the persisted theme before first paint to avoid a flash.
			(function () {
				try {
					var a = localStorage.getItem('glyph:appearance') || 'system';
					var dark =
						a === 'dark' ||
						(a === 'system' &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					var el = document.documentElement;
					el.classList.toggle('dark', dark);
					el.style.colorScheme = dark ? 'dark' : 'light';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Boot splash: shown before the app mounts, removed by the root layout.
		     Inline (no app.css yet) so it paints immediately; the theme script
		     above has already set `.dark` to avoid a flash. -->
		<div id="boot" aria-hidden="true">
			<svg
				class="boot-mark"
				width="56"
				height="56"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M13.5 3H7.5A2 2 0 0 0 5.5 5V19A2 2 0 0 0 7.5 21H16.5A2 2 0 0 0 18.5 19V8L13.5 3Z" />
				<path d="M13.5 3V8H18.5" />
				<path d="M9 12.75H15" />
				<path d="M9 16H13" />
			</svg>
		</div>
		<style>
			#boot {
				position: fixed;
				inset: 0;
				z-index: 99999;
				display: grid;
				place-items: center;
				background: #fafafa;
				transition: opacity 0.28s ease;
			}
			html.dark #boot {
				background: #0a0a0c;
			}
			#boot .boot-mark {
				color: #0a0a0c;
				animation: boot-pulse 1.4s ease-in-out infinite;
			}
			html.dark #boot .boot-mark {
				color: #fafafa;
			}
			#boot.boot-leaving {
				opacity: 0;
			}
			@keyframes boot-pulse {
				0%,
				100% {
					opacity: 0.35;
					transform: scale(0.96);
				}
				50% {
					opacity: 1;
					transform: scale(1);
				}
			}
			@media (prefers-reduced-motion: reduce) {
				#boot .boot-mark {
					animation: none;
				}
			}
		</style>
	</body>
</html>
