<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the persisted theme before first paint to avoid a flash.
			(function () {
				try {
					var a = localStorage.getItem('glyphx:appearance') || 'system';
					var dark =
						a === 'dark' ||
						(a === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					var el = document.documentElement;
					el.classList.toggle('dark', dark);
					el.style.colorScheme = dark ? 'dark' : 'light';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Boot splash: shown before the app mounts, removed by the root layout.
		     Inline (no app.css yet) so it paints immediately; the theme script
		     above has already set `.dark` to avoid a flash. -->
		<div id="boot" aria-hidden="true">
			<svg
				class="boot-mark"
				width="60"

				<defs>
					<linearGradient
						id="bootGlyph"
						x1="0"
						y1="26"
						x2="312"
						y2="334"
						gradientUnits="userSpaceOnUse"
					>
						<stop stop-color="#1F9CF0" />
						<stop offset="0.5" stop-color="#007ACC" />
						<stop offset="1" stop-color="#1177BB" />
					</linearGradient>
				</defs>
			</svg>
		</div>
		<style>
			#boot {
				position: fixed;
				inset: 0;
				z-index: 99999;
				display: grid;
				place-items: center;
				background: #fafbfc;
				transition: opacity 0.28s ease;
			}
			html.dark #boot {
				background: #0a0a0c;
			}
			#boot .boot-mark {
				animation: boot-pulse 1.4s ease-in-out infinite;
			}
			#boot.boot-leaving {
				opacity: 0;
			}
			@keyframes boot-pulse {
				0%,
				100% {
					opacity: 0.35;
					transform: scale(0.96);
				}
				50% {
					opacity: 1;
					transform: scale(1);
				}
			}
			@media (prefers-reduced-motion: reduce) {
				#boot .boot-mark {
					animation: none;
				}
			}
		</style>
	</body>
</html>
