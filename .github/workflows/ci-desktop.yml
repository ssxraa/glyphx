name: CI Desktop App

# Per-push compile + lint + unit-test gate for the desktop app on all three
# target OSes. `release-desktop.yml` already builds + bundles Windows/macOS/Linux,
# but it only fires on `v*` tags — far too late to catch a change that broke a
# platform you can't run locally. This workflow compiles and runs the (OS-
# agnostic) Rust unit tests on every push/PR so cross-platform code stays green
# while it's being written. Tectonic is bundled as a sidecar; here we never run
# it, so empty placeholder sidecars are enough to satisfy the build.

on:
  # Push is scoped to the default branch only; `pull_request` covers every other
  # branch. Running push on "**" as well caused a duplicate run whenever a commit
  # landed on a branch that also had an open PR. Tag pushes (`v*`, handled by
  # release-desktop.yml) don't match a `branches` filter, so no tags-ignore.
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/ci-desktop.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/ci-desktop.yml"

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.23.0"
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Fast, OS-agnostic frontend gate — Prettier + ESLint + svelte-check. Runs the
  # same `lint` / `check` package scripts you run locally (and that the root
  # `pnpm lint` aggregates via turbo), so green here means green on your machine.
  lint:
    name: Lint & typecheck (frontend)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Format check (prettier)
        run: pnpm --filter @glyphx/desktop format:check

      - name: Lint (eslint)
        run: pnpm --filter @glyphx/desktop lint:eslint

      - name: Typecheck (svelte-check)
        run: pnpm --filter @glyphx/desktop check

  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all --check

  compile:
    name: Compile (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - name: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          key: ci-${{ matrix.platform.rust_target }}
          shared-key: ci-tauri-${{ matrix.platform.name }}
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-24.04'
        run: bash scripts/release/install-linux-deps.sh

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # `tauri::generate_context!` validates that every `externalBin` sidecar
      # exists for the target triple at macro-expansion time, so even a
      # no-bundle compile needs the file present. We never execute Tectonic in
      # CI, so an empty placeholder is enough — this skips the ~50 MB engine
      # download the release workflow does.
      - name: Create placeholder Tectonic sidecar
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            : > "$dest/tectonic-$triple.exe"
          else
            : > "$dest/tectonic-$triple"
            chmod +x "$dest/tectonic-$triple"
          fi

      # `tauri build --no-bundle` runs the frontend build (beforeBuildCommand)
      # and a full release compile of the Rust crate, then stops before
      # producing installers. That is exactly the cross-platform compile gate we
      # want: it proves the code builds on each OS without the slow packaging
      # steps.
      - name: Compile desktop app (no bundle)
        run: pnpm --filter @glyphx/desktop tauri build --no-bundle ${{ matrix.platform.tauri_args }}

      # Rust unit tests (OS-agnostic pure functions — engine-flag mapping, etc.).
      # `--release` + the same target reuses the artifacts the compile step just
      # built. Deliberately no `continue-on-error`: a failing test fails the build.
      - name: Run Rust unit tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib --release ${{ matrix.platform.tauri_args }}

      # Clippy after the build so the compile gate above is the hard failure
      # signal; lint findings surface here without blocking until the team
      # decides to make them blocking (drop `continue-on-error` then).
      - name: Clippy
        continue-on-error: true
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --target ${{ matrix.platform.rust_target }}
