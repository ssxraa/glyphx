name: Release Desktop App

# Builds + bundles the GlyphX desktop app for Windows / macOS (arm64 + x64) /
# Linux when a `v*` tag is pushed (or via manual dispatch), and attaches the
# installers to a GitHub Release. Tectonic ships inside each installer as a
# Tauri sidecar (downloaded per target triple by scripts/release/download-tectonic.mjs).
#
# Procedural detail lives in `scripts/release/`: the Tectonic download, the
# Linux system deps, and the tag→manifest version sync are each their own file.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.23.0"
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # Tectonic engine version pinned for reproducible release builds. Bump
  # deliberately; do NOT track "latest". Must match the default in
  # scripts/release/download-tectonic.mjs.
  TECTONIC_VERSION: "0.16.9"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: GlyphX ${{ steps.resolve_tag.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-desktop:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: macos-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          # Built on the OLDEST supported runner on purpose: the glibc + system
          # library versions present at build time become the FLOOR for what the
          # AppImage / .deb can run on. ubuntu-22.04 (glibc 2.35) still ships
          # webkit2gtk-4.1, so the bundle runs on Ubuntu 22.04+/Debian 12+ as
          # well as newer distros. Building on 24.04 (glibc 2.39) would silently
          # drop every distro older than itself.
          - name: linux-x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          # Bump `prefix-key` to invalidate every cached target/ at once — the old
          # caches were poisoned by a half-built target/ saved from a failed run
          # (see cache-on-failure below), which restored without tauri's rlib
          # → "can't find crate for tauri".
          prefix-key: v2-rust
          key: ${{ matrix.platform.rust_target }}
          shared-key: tauri-${{ matrix.platform.name }}
          # Don't persist a half-built target/ from a failed run.
          cache-on-failure: false

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.platform.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.platform.os }}-

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: bash scripts/release/install-linux-deps.sh

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Tectonic sidecar
        id: tectonic-cache
        # A flaky cache restore must never sink the whole release leg: the
        # sidecar is re-downloadable from the step below. On a cache error
        # `cache-hit` stays falsy, so the download runs and the build still
        # gets its Tectonic binary.
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/binaries
          key: tectonic-${{ env.TECTONIC_VERSION }}-${{ matrix.platform.rust_target }}

      - name: Download Tectonic sidecar
        if: steps.tectonic-cache.outputs.cache-hit != 'true'
        run: >-
          node scripts/release/download-tectonic.mjs
          --target ${{ matrix.platform.rust_target }}
          --version ${{ env.TECTONIC_VERSION }}
          --dest apps/desktop/src-tauri/binaries

      - name: Sync version from tag
        env:
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: node scripts/release/sync-version.mjs

      - name: Build Tauri app
        shell: bash
        env:
          # Signs the updater artifacts (.sig files) when an updater pubkey is
          # configured in tauri.conf.json. Optional: without these the build
          # still succeeds and just produces unsigned bundles. Add as repo
          # secrets once you wire up auto-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @glyphx/desktop tauri build ${{ matrix.platform.tauri_args }}

      # Both macOS legs emit an identically-named `GlyphX.app.tar.gz` updater
      # bundle; tag each with its arch so they don't collide on the release and
      # so generate-latest-json.sh can tell darwin-aarch64 from darwin-x86_64.
      - name: Tag macOS updater bundle with arch
        if: matrix.platform.os == 'macos-latest'
        env:
          TAG: ${{ needs.create-release.outputs.tag_name }}
          RUST_TARGET: ${{ matrix.platform.rust_target }}
        run: bash scripts/release/rename-macos-updater-bundle.sh

      # Collect the installers from wherever Tauri wrote them. Without `--target`
      # (Linux/Windows) bundles land in target/release/bundle; with `--target`
      # (macOS) they land in target/<triple>/release/bundle. Copy the known
      # installer/updater artifacts into a flat release-assets dir.
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for base in \
            "apps/desktop/src-tauri/target/release/bundle" \
            "apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle"; do
            [ -d "$base" ] || continue
            find "$base" -type f \
              \( -iname '*.dmg' -o -iname '*.app.tar.gz' -o -iname '*.app.tar.gz.sig' \
                 -o -iname '*-setup.exe' -o -iname '*-setup.exe.sig' \
                 -o -iname '*.msi' -o -iname '*.msi.sig' \
                 -o -iname '*.nsis.zip' -o -iname '*.nsis.zip.sig' \
                 -o -iname '*.AppImage' -o -iname '*.AppImage.sig' \
                 -o -iname '*.deb' -o -iname '*.rpm' \) \
              -exec cp -f {} release-assets/ \;
          done
          echo "----- release-assets -----"
          ls -la release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: true
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Upload updater signatures for manifest
        # The generate-manifest job assembles latest.json from these `.sig`
        # files. Only the signatures are needed — the manifest references the
        # bundles by their release-asset URL. If signing secrets are unset no
        # `.sig` files exist; the manifest job then skips with a clear notice
        # rather than publishing a broken updater.
        uses: actions/upload-artifact@v4
        with:
          name: updater-sigs-${{ matrix.platform.name }}
          path: release-assets/*.sig
          if-no-files-found: warn
          retention-days: 1

      - name: Upload build artifacts (debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glyphx-${{ matrix.platform.name }}-${{ needs.create-release.outputs.tag_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: 7

  generate-manifest:
    name: Generate updater manifest
    needs: [create-release, build-desktop]
    # Run even when one build leg fails — the manifest still publishes for the
    # legs that succeeded, and the `--require` list below turns a missing
    # platform into a hard error so a partial updater can't ship silently. Only
    # `!cancelled()` (not `always()`): a cancelled run shouldn't produce a
    # half-finished manifest.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download updater signatures
        # Tolerate "no artifacts": when signing secrets are unset, no leg
        # produced a `.sig`, so nothing was uploaded. The skip check below then
        # exits cleanly instead of failing the release.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: updater-sigs-*
          path: updater-sigs
          merge-multiple: true

      - name: Skip when updater signing isn't configured
        id: check
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sigs=(updater-sigs/*.sig)
          if [ ${#sigs[@]} -eq 0 ]; then
            echo "::warning::No updater signatures found (TAURI_SIGNING_PRIVATE_KEY not configured) — skipping latest.json. Auto-update will be unavailable for this release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate latest.json
        if: steps.check.outputs.skip != 'true'
        run: |
          bash scripts/release/generate-latest-json.sh \
            --tag "${{ needs.create-release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir updater-sigs \
            --require "windows-x86_64,linux-x86_64,darwin-aarch64,darwin-x86_64" \
            --out latest.json
          echo "----- latest.json -----"
          cat latest.json

      - name: Upload latest.json to release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: true
          prerelease: false
          files: latest.json
          fail_on_unmatched_files: true

  publish-release:
    name: Publish release
    needs: [create-release, build-desktop, generate-manifest]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
          prerelease: false
