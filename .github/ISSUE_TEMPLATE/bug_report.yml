name: Bug report
description: Something works incorrectly in the desktop app or web editor.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For LaTeX compilation / PDF problems use the **Compile / PDF issue** template; for crashes use **Crash report**.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Be specific. Include the project, the main `.tex` file, or the settings used if relevant.
      placeholder: |
        1. Open GlyphX
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: GlyphX version
      description: From the app's About screen, or the installer filename.
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where does this happen?
      options:
        - Desktop app
        - Web (glyphx.nexonauts.com)
        - Both
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Which compile engine?
      description: Settings → Engine. Skip if not compile-related.
      options:
        - Not applicable
        - Bundled Tectonic
        - System TeX (latexmk / TeX Live / MiKTeX)
        - Not sure
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "Windows 11 23H2 / macOS 14.5 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or a sample document
      description: |
        Drag-and-drop attachments here. A minimal `.tex` that reproduces the issue helps a lot. App logs live at:
        - Windows: `%APPDATA%\com.nexonauts.glyphx\logs`
        - macOS: `~/Library/Logs/com.nexonauts.glyphx`
        - Linux: `~/.config/com.nexonauts.glyphx/logs`
  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm running the latest release (or have noted the version above).
          required: true
